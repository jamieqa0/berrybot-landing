  <path d="M278,272 L264,342 Q314,368 364,342 L350,272 Z" fill="url(#p1-basket)" stroke="#7A4818" stroke-width="2.5"/>
  <!-- Weave lines -->
  <line x1="270" y1="292" x2="358" y2="292" stroke="#7A4818" stroke-width="1.1" opacity="0.5"/>
  <line x1="268" y1="312" x2="360" y2="312" stroke="#7A4818" stroke-width="1.1" opacity="0.5"/>
  <line x1="267" y1="328" x2="361" y2="328" stroke="#7A4818" stroke-width="1.1" opacity="0.5"/>
  <line x1="298" y1="272" x2="291" y2="350" stroke="#7A4818" stroke-width="1.1" opacity="0.4"/>
  <line x1="314" y1="272" x2="314" y2="354" stroke="#7A4818" stroke-width="1.1" opacity="0.4"/>
  <line x1="330" y1="272" x2="337" y2="350" stroke="#7A4818" stroke-width="1.1" opacity="0.4"/>
  <!-- Handle -->
  <path d="M282,272 Q314,237 346,272" fill="none" stroke="#7A4818" stroke-width="5" stroke-linecap="round"/>
  <path d="M282,274 L346,274" stroke="#E8C070" stroke-width="1.8" opacity="0.6"/>
  <!-- Back layer: blueberries -->
  <circle cx="291" cy="324" r="9" fill="#5566DD" stroke="#3344AA" stroke-width="1.5"/>
  <circle cx="291" cy="324" r="3" fill="#8899FF" opacity="0.5"/>
  <circle cx="309" cy="328" r="8.5" fill="#4455CC" stroke="#3344AA" stroke-width="1.5"/>
  <circle cx="309" cy="328" r="2.8" fill="#7788EE" opacity="0.5"/>
  <circle cx="328" cy="322" r="9" fill="#5566DD" stroke="#3344AA" stroke-width="1.5"/>
  <circle cx="328" cy="322" r="3" fill="#8899FF" opacity="0.5"/>
  <circle cx="347" cy="326" r="8" fill="#4455CC" stroke="#3344AA" stroke-width="1.5"/>
  <circle cx="347" cy="326" r="2.6" fill="#7788EE" opacity="0.5"/>
  <!-- Back strawberries -->
  <ellipse cx="283" cy="300" rx="14" ry="11" fill="#FF4466" stroke="#CC1133" stroke-width="1.8"/>
  <path d="M283,289 C277,282 273,284 275,289 C276,282 283,279 283,284 C283,279 290,282 291,289 C293,284 289,282 283,289" fill="#4CAF50" stroke="#2E7D32" stroke-width="1.2"/>
  <ellipse cx="279" cy="298" rx="2.5" ry="1.8" fill="#FFE14D" stroke="#CCA800" stroke-width="0.9"/>
  <ellipse cx="287" cy="295" rx="2.5" ry="1.8" fill="#FFE14D" stroke="#CCA800" stroke-width="0.9"/>
  <ellipse cx="346" cy="297" rx="13" ry="10" fill="#FF3355" stroke="#CC1133" stroke-width="1.8"/>
  <path d="M346,287 C340,280 336,282 338,287 C339,280 346,277 346,282 C346,277 353,280 354,287 C356,282 352,280 346,287" fill="#4CAF50" stroke="#2E7D32" stroke-width="1.2"/>
  <ellipse cx="342" cy="295" rx="2.5" ry="1.8" fill="#FFE14D" stroke="#CCA800" stroke-width="0.9"/>
  <ellipse cx="350" cy="292" rx="2.5" ry="1.8" fill="#FFE14D" stroke="#CCA800" stroke-width="0.9"/>
  <!-- Front strawberries -->
  <ellipse cx="298" cy="267" rx="17" ry="14" fill="#FF3355" stroke="#CC1133" stroke-width="1.8"/>
  <path d="M298,253 C291,245 286,247 289,253 C290,245 298,242 298,248 C298,242 306,245 307,253 C310,247 305,245 298,253" fill="#4CAF50" stroke="#2E7D32" stroke-width="1.2"/>
  <ellipse cx="293" cy="264" rx="3.2" ry="2.3" fill="#FFE14D" stroke="#CCA800" stroke-width="0.9" transform="rotate(-15,293,264)"/>
  <ellipse cx="303" cy="261" rx="3.2" ry="2.3" fill="#FFE14D" stroke="#CCA800" stroke-width="0.9"/>
  <ellipse cx="296" cy="271" rx="3" ry="2.1" fill="#FFE14D" stroke="#CCA800" stroke-width="0.9" transform="rotate(12,296,271)"/>
  <ellipse cx="326" cy="260" rx="16" ry="13" fill="#FF4466" stroke="#CC1133" stroke-width="1.8"/>
  <path d="M326,247 C319,239 314,241 317,247 C318,239 326,236 326,242 C326,236 334,239 335,247 C338,241 333,239 326,247" fill="#4CAF50" stroke="#2E7D32" stroke-width="1.2"/>
  <ellipse cx="321" cy="257" rx="3" ry="2.2" fill="#FFE14D" stroke="#CCA800" stroke-width="0.9"/>
  <ellipse cx="332" cy="255" rx="3" ry="2.2" fill="#FFE14D" stroke="#CCA800" stroke-width="0.9" transform="rotate(10,332,255)"/>
  <ellipse cx="312" cy="280" rx="14" ry="11" fill="#FF3355" stroke="#CC1133" stroke-width="1.8"/>
  <ellipse cx="308" cy="277" rx="2.5" ry="1.8" fill="#FFE14D" stroke="#CCA800" stroke-width="0.9"/>
  <ellipse cx="316" cy="275" rx="2.5" ry="1.8" fill="#FFE14D" stroke="#CCA800" stroke-width="0.9"/>
</g>

<!-- === BERRYBOT === -->
<g filter="url(#p1-drop)">
  <!-- Legs -->
  <rect x="148" y="368" width="16" height="28" rx="8" fill="#B8B8C8" stroke="#909098" stroke-width="2"/>
  <rect x="172" y="368" width="16" height="28" rx="8" fill="#B8B8C8" stroke="#909098" stroke-width="2"/>
  <!-- Feet -->
  <ellipse cx="156" cy="396" rx="14" ry="8.5" fill="#909098" stroke="#686870" stroke-width="1.8"/>
  <ellipse cx="180" cy="396" rx="14" ry="8.5" fill="#909098" stroke="#686870" stroke-width="1.8"/>

  <!-- Body -->
  <path d="M166,178 C114,183 92,222 94,268 C96,314 129,356 166,368 C203,356 236,314 238,268 C240,222 218,183 166,178" fill="url(#p1-body)" stroke="#AA0022" stroke-width="3"/>

  <!-- Apron -->
  <path d="M122,268 Q166,258 210,268 Q207,326 166,340 Q125,326 122,268" fill="white" fill-opacity="0.82" stroke="#FFD8E0" stroke-width="1.5"/>
  <ellipse cx="150" cy="290" rx="5.5" ry="7" fill="#FF3355" opacity="0.42"/>
  <ellipse cx="167" cy="283" rx="4.5" ry="6" fill="#FF3355" opacity="0.32"/>
  <ellipse cx="182" cy="296" rx="4.5" ry="6" fill="#FF3355" opacity="0.32"/>

  <!-- Seeds -->
  <ellipse cx="132" cy="232" rx="6" ry="4.1" fill="#FFE14D" stroke="#CCA800" stroke-width="1.5" transform="rotate(-20,132,232)"/>
  <ellipse cx="160" cy="218" rx="6" ry="4.1" fill="#FFE14D" stroke="#CCA800" stroke-width="1.5" transform="rotate(-5,160,218)"/>
  <ellipse cx="192" cy="226" rx="6" ry="4.1" fill="#FFE14D" stroke="#CCA800" stroke-width="1.5" transform="rotate(15,192,226)"/>
  <ellipse cx="123" cy="268" rx="5" ry="3.4" fill="#FFE14D" stroke="#CCA800" stroke-width="1.5" transform="rotate(-15,123,268)"/>
  <ellipse cx="208" cy="264" rx="5" ry="3.4" fill="#FFE14D" stroke="#CCA800" stroke-width="1.5" transform="rotate(20,208,264)"/>

  <!-- Arms -->
  <path d="M95,265 L56,248" stroke="url(#p1-body)" stroke-width="20" stroke-linecap="round"/>
  <circle cx="47" cy="244" r="14" fill="#FF3355" stroke="#AA0022" stroke-width="2.5"/>
  <path d="M237,261 L274,246" stroke="url(#p1-body)" stroke-width="20" stroke-linecap="round"/>
  <circle cx="283" cy="242" r="14" fill="#FF3355" stroke="#AA0022" stroke-width="2.5"/>

  <!-- Leaf crown -->
  <path d="M126,185 C124,155 138,138 149,156 C149,134 160,121 168,139 C174,122 186,132 181,151 C191,135 204,145 198,164 C208,153 220,164 212,183 L166,186 Z" fill="url(#p1-leaf)" stroke="#1B5E20" stroke-width="2.2"/>
  <path d="M147,163 C149,146 158,133 163,141" fill="none" stroke="#A5D6A7" stroke-width="2" stroke-linecap="round"/>
  <path d="M180,151 C182,138 188,132 190,139" fill="none" stroke="#A5D6A7" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Face -->
  <ellipse cx="166" cy="214" rx="42" ry="33" fill="url(#p1-face)"/>

  <!-- Eyes (excited big) -->
  <circle cx="150" cy="208" r="13" fill="white" stroke="#222" stroke-width="2.2"/>
  <circle cx="182" cy="208" r="13" fill="white" stroke="#222" stroke-width="2.2"/>
  <circle cx="152" cy="210" r="7.5" fill="#1A1A1A"/>
  <circle cx="184" cy="210" r="7.5" fill="#1A1A1A"/>
  <circle cx="155" cy="206" r="3.5" fill="white"/>
  <circle cx="187" cy="206" r="3.5" fill="white"/>
  <circle cx="158" cy="212" r="1.8" fill="white" opacity="0.7"/>
  <circle cx="190" cy="212" r="1.8" fill="white" opacity="0.7"/>

  <!-- Mouth -->
  <path d="M152,226 Q166,241 180,226" fill="none" stroke="#AA0022" stroke-width="3.2" stroke-linecap="round"/>

  <!-- Cheeks -->
  <ellipse cx="130" cy="222" rx="13" ry="8" fill="#FFB3C1" opacity="0.65"/>
  <ellipse cx="202" cy="222" rx="13" ry="8" fill="#FFB3C1" opacity="0.65"/>
</g>

<!-- Speech bubble -->
<path d="M16,38 Q16,18 36,18 L214,18 Q234,18 234,38 L234,88 Q234,108 214,108 L108,108 L96,124 L90,108 Q16,108 16,88 Z" fill="white" stroke="#FFD0D8" stroke-width="2.2" filter="url(#p1-soft)"/>
<text x="125" y="56" text-anchor="middle" font-size="13.5" font-weight="bold" fill="#333">냠냠냠...</text>
<text x="125" y="78" text-anchor="middle" font-size="13" font-weight="bold" fill="#FF3355">신선한 베리 넣어줘요!</text>

<!-- Sparkles -->
<text x="248" y="54" font-size="18" opacity="0.8">✨</text>
<text x="28" y="168" font-size="13" fill="#FFB800" opacity="0.6">⭐</text>
<text x="348" y="152" font-size="16" fill="#FFB800" opacity="0.5">✨</text>

<!-- Panel number -->
<circle cx="32" cy="32" r="20" fill="#FF3355" stroke="white" stroke-width="2.8" filter="url(#p1-soft)"/>
<text x="32" y="38" text-anchor="middle" fill="white" font-size="15" font-weight="bold">1</text>

<!-- Bottom caption -->
<rect x="0" y="420" width="400" height="80" rx="0" fill="white" fill-opacity="0.55"/>
<rect x="0" y="420" width="400" height="3" fill="#FF3355" fill-opacity="0.28"/>
<text x="200" y="452" text-anchor="middle" fill="#CC1133" font-size="20" font-weight="bold">넣어볼까요! 🍓</text>
<text x="200" y="474" text-anchor="middle" fill="#AA8090" font-size="12">베리봇 투입구에 딸기를 넣어요</text>
<path d="M0,500 L0,490 Q0,500 20,500 L380,500 Q400,500 400,490 L400,500 Z" fill="white" fill-opacity="0.3"/>
</svg>
