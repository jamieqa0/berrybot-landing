<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" font-family="Arial, sans-serif">
  <!-- Panel border + background -->
  <rect x="2" y="2" width="396" height="496" rx="12" fill="#FFF8F0" stroke="#333" stroke-width="4"/>

  <!-- === BACKGROUND === -->
  <!-- Wall -->
  <rect x="4" y="4" width="392" height="388" rx="10" fill="#FFF0DC"/>
  <!-- Wallpaper dots -->
  <circle cx="60" cy="50" r="4" fill="#FFD0B0" opacity="0.5"/>
  <circle cx="130" cy="35" r="3" fill="#FFD0B0" opacity="0.5"/>
  <circle cx="310" cy="45" r="4" fill="#FFD0B0" opacity="0.5"/>
  <circle cx="360" cy="70" r="3" fill="#FFD0B0" opacity="0.5"/>
  <circle cx="80" cy="160" r="3" fill="#FFD0B0" opacity="0.4"/>
  <circle cx="360" cy="155" r="4" fill="#FFD0B0" opacity="0.4"/>
  <!-- Floor -->
  <rect x="4" y="388" width="392" height="110" fill="#C8845A"/>
  <rect x="4" y="388" width="392" height="16" fill="#A06040"/>

  <!-- === BASKET === -->
  <!-- Basket body -->
  <path d="M 262,290 L 248,368 L 358,368 L 344,290 Z" fill="#C8955A" stroke="#7A5220" stroke-width="3"/>
  <!-- Basket weave -->
  <line x1="255" y1="310" x2="351" y2="310" stroke="#7A5220" stroke-width="1.5"/>
  <line x1="251" y1="330" x2="355" y2="330" stroke="#7A5220" stroke-width="1.5"/>
  <line x1="249" y1="350" x2="357" y2="350" stroke="#7A5220" stroke-width="1.5"/>
  <line x1="281" y1="290" x2="274" y2="368" stroke="#7A5220" stroke-width="1.5"/>
  <line x1="303" y1="290" x2="303" y2="368" stroke="#7A5220" stroke-width="1.5"/>
  <line x1="325" y1="290" x2="332" y2="368" stroke="#7A5220" stroke-width="1.5"/>
  <!-- Basket handle -->
  <path d="M 266,290 Q 303,248 340,290" fill="none" stroke="#7A5220" stroke-width="5" stroke-linecap="round"/>
  <!-- Strawberries in basket -->
  <ellipse cx="278" cy="285" rx="17" ry="13" fill="#FF3355" stroke="#CC1133" stroke-width="2"/>
  <path d="M 278,272 C 272,264 267,266 270,272 C 271,264 278,260 278,266 C 278,260 285,264 286,272 C 289,266 284,264 278,272" fill="#4CAF50" stroke="#2E7D32" stroke-width="1.5"/>
  <ellipse cx="302" cy="277" rx="16" ry="12" fill="#FF4466" stroke="#CC1133" stroke-width="2"/>
  <path d="M 302,265 C 296,258 291,260 294,265 C 295,258 302,255 302,261 C 302,255 309,258 311,265 C 313,260 308,258 302,265" fill="#4CAF50" stroke="#2E7D32" stroke-width="1.5"/>
  <ellipse cx="325" cy="283" rx="15" ry="12" fill="#FF3355" stroke="#CC1133" stroke-width="2"/>
  <path d="M 325,271 C 319,264 315,265 317,271 C 318,264 325,261 325,267 C 325,261 332,264 333,271 C 335,265 331,264 325,271" fill="#4CAF50" stroke="#2E7D32" stroke-width="1.5"/>
  <ellipse cx="290" cy="294" rx="14" ry="11" fill="#FF4466" stroke="#CC1133" stroke-width="2"/>
  <ellipse cx="314" cy="293" rx="14" ry="11" fill="#FF3355" stroke="#CC1133" stroke-width="2"/>

  <!-- === BERRYBOT === -->
  <!-- Legs -->
  <rect x="142" y="372" width="18" height="30" rx="8" fill="#888" stroke="#555" stroke-width="2.5"/>
  <rect x="168" y="372" width="18" height="30" rx="8" fill="#888" stroke="#555" stroke-width="2.5"/>
  <!-- Feet -->
  <ellipse cx="151" cy="402" rx="14" ry="8" fill="#555" stroke="#333" stroke-width="2"/>
  <ellipse cx="177" cy="402" rx="14" ry="8" fill="#555" stroke="#333" stroke-width="2"/>

  <!-- Body (strawberry shape) -->
  <path d="M 164,188 C 112,193 91,233 93,278 C 95,323 128,364 164,376 C 200,364 233,323 235,278 C 237,233 216,193 164,188" fill="#FF3355" stroke="#CC1133" stroke-width="3.5"/>

  <!-- Apron -->
  <path d="M 122,285 Q 164,275 206,285 Q 203,342 164,357 Q 125,342 122,285" fill="white" stroke="#EEE" stroke-width="1.5" opacity="0.88"/>
  <!-- Apron strawberry deco -->
  <ellipse cx="150" cy="308" rx="6" ry="8" fill="#FF3355" opacity="0.65"/>
  <path d="M 150,300 C 147,296 144,297 146,301 C 146,296 150,294 150,298 C 150,294 154,296 154,301 C 156,297 153,296 150,300" fill="#4CAF50" opacity="0.8"/>
  <ellipse cx="168" cy="300" rx="5" ry="7" fill="#FF3355" opacity="0.55"/>
  <ellipse cx="183" cy="314" rx="5" ry="7" fill="#FF3355" opacity="0.55"/>

  <!-- Seeds -->
  <ellipse cx="136" cy="240" rx="6" ry="4" fill="#FFE14D" stroke="#CCA800" stroke-width="1.5" transform="rotate(-20,136,240)"/>
  <ellipse cx="162" cy="226" rx="6" ry="4" fill="#FFE14D" stroke="#CCA800" stroke-width="1.5" transform="rotate(-5,162,226)"/>
  <ellipse cx="190" cy="234" rx="6" ry="4" fill="#FFE14D" stroke="#CCA800" stroke-width="1.5" transform="rotate(15,190,234)"/>
  <ellipse cx="128" cy="272" rx="5" ry="3.5" fill="#FFE14D" stroke="#CCA800" stroke-width="1.5" transform="rotate(-15,128,272)"/>
  <ellipse cx="203" cy="268" rx="5" ry="3.5" fill="#FFE14D" stroke="#CCA800" stroke-width="1.5" transform="rotate(20,203,268)"/>

  <!-- Left arm (reaching toward basket) -->
  <path d="M 98,278 L 58,295" stroke="#FF3355" stroke-width="16" stroke-linecap="round"/>
  <circle cx="51" cy="298" r="12" fill="#FF3355" stroke="#CC1133" stroke-width="2.5"/>
  <!-- Right arm (reaching toward basket) -->
  <path d="M 230,274 L 262,264" stroke="#FF3355" stroke-width="16" stroke-linecap="round"/>
  <circle cx="270" cy="261" r="12" fill="#FF3355" stroke="#CC1133" stroke-width="2.5"/>

  <!-- Leaf crown -->
  <path d="M 128,195 C 126,166 140,151 150,167 C 150,148 161,137 169,153 C 174,138 185,147 180,165 C 189,150 202,159 197,178 C 206,167 216,177 208,194 L 164,197 Z" fill="#4CAF50" stroke="#2E7D32" stroke-width="2.5"/>
  <path d="M 149,176 C 151,161 160,150 165,156" fill="none" stroke="#81C784" stroke-width="2" stroke-linecap="round"/>

  <!-- Face bg -->
  <ellipse cx="164" cy="222" rx="38" ry="30" fill="#FFD0D8"/>

  <!-- Eyes (excited big circles) -->
  <circle cx="150" cy="216" r="11" fill="white" stroke="#333" stroke-width="2.5"/>
  <circle cx="178" cy="216" r="11" fill="white" stroke="#333" stroke-width="2.5"/>
  <circle cx="152" cy="218" r="6" fill="#333"/>
  <circle cx="180" cy="218" r="6" fill="#333"/>
  <circle cx="154" cy="215" r="2.5" fill="white"/>
  <circle cx="182" cy="215" r="2.5" fill="white"/>

  <!-- Mouth (big smile) -->
  <path d="M 151,232 Q 164,244 177,232" fill="none" stroke="#CC1133" stroke-width="3" stroke-linecap="round"/>

  <!-- Cheeks -->
  <ellipse cx="135" cy="228" rx="10" ry="6" fill="#FFB3C1" opacity="0.7"/>
  <ellipse cx="193" cy="228" rx="10" ry="6" fill="#FFB3C1" opacity="0.7"/>

  <!-- === SPEECH BUBBLE === -->
  <path d="M 198,52 Q 375,52 375,100 Q 375,148 312,148 Q 299,148 289,160 L 284,148 Q 198,148 198,100 Z" fill="white" stroke="#333" stroke-width="3"/>
  <text x="287" y="90" text-anchor="middle" fill="#333" font-size="14" font-weight="bold">냠냠냠...</text>
  <text x="287" y="114" text-anchor="middle" fill="#FF3355" font-size="13" font-weight="bold">오늘도 딸기다!</text>

  <!-- Sound effects -->
  <text x="48" y="68" font-size="22" fill="#FFB800">✨</text>
  <text x="352" y="52" font-size="16" fill="#FFB800">⭐</text>
  <text x="52" y="148" font-size="14" fill="#FFB800">✨</text>
  <text x="42" y="330" font-size="16" fill="#FF8800" opacity="0.6">♪</text>

  <!-- Panel number badge -->
  <circle cx="28" cy="28" r="20" fill="#FF3355" stroke="#CC1133" stroke-width="3"/>
  <text x="28" y="34" text-anchor="middle" fill="white" font-size="15" font-weight="bold">1</text>

  <!-- === BOTTOM TITLE === -->
  <line x1="10" y1="420" x2="390" y2="420" stroke="#FF3355" stroke-width="2.5" stroke-dasharray="8,4"/>
  <text x="200" y="455" text-anchor="middle" fill="#CC1133" font-size="20" font-weight="bold">배달 왔어요! 🍓</text>
  <text x="200" y="480" text-anchor="middle" fill="#999" font-size="12">베리봇이 딸기 바구니를 받는다</text>
</svg>
