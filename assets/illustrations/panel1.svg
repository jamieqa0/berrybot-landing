<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" font-family="'Apple SD Gothic Neo','Noto Sans KR',Arial,sans-serif">
<defs>
  <radialGradient id="p1-body" cx="36%" cy="30%" r="70%">
    <stop offset="0%" stop-color="#FF7090"/>
    <stop offset="55%" stop-color="#FF3355"/>
    <stop offset="100%" stop-color="#BB0030"/>
  </radialGradient>
  <radialGradient id="p1-bg" cx="50%" cy="25%" r="85%">
    <stop offset="0%" stop-color="#FFF9F0"/>
    <stop offset="100%" stop-color="#FFE8D0"/>
  </radialGradient>
  <radialGradient id="p1-face" cx="38%" cy="32%" r="68%">
    <stop offset="0%" stop-color="#FFE8EE"/>
    <stop offset="100%" stop-color="#FFBCCC"/>
  </radialGradient>
  <linearGradient id="p1-leaf" x1="0" y1="0" x2="0.2" y2="1">
    <stop offset="0%" stop-color="#76C442"/>
    <stop offset="100%" stop-color="#2E7D32"/>
  </linearGradient>
  <linearGradient id="p1-basket" x1="0" y1="0" x2="0.1" y2="1">
    <stop offset="0%" stop-color="#DDB870"/>
    <stop offset="100%" stop-color="#9A6828"/>
  </linearGradient>
  <filter id="p1-drop" x="-25%" y="-15%" width="150%" height="145%">
    <feDropShadow dx="3" dy="8" stdDeviation="9" flood-color="#AA002240"/>
  </filter>
  <filter id="p1-soft" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="1" dy="3" stdDeviation="5" flood-color="#00000020"/>
  </filter>
</defs>

<!-- Background -->
<rect width="400" height="500" rx="20" fill="url(#p1-bg)"/>
<!-- Dot pattern -->
<circle cx="34" cy="45" r="5" fill="#FFD4A8" opacity="0.55"/>
<circle cx="95" cy="25" r="3.5" fill="#FFD4A8" opacity="0.45"/>
<circle cx="335" cy="38" r="4.5" fill="#FFD4A8" opacity="0.55"/>
<circle cx="372" cy="78" r="3" fill="#FFD4A8" opacity="0.45"/>
<circle cx="25" cy="145" r="3" fill="#FFD4A8" opacity="0.38"/>
<circle cx="376" cy="122" r="4" fill="#FFD4A8" opacity="0.35"/>
<circle cx="368" cy="195" r="3" fill="#FFD4A8" opacity="0.3"/>
<circle cx="28" cy="215" r="2.5" fill="#FFD4A8" opacity="0.3"/>
<!-- Border -->
<rect x="3" y="3" width="394" height="494" rx="18" fill="none" stroke="#FFD0D8" stroke-width="2.5"/>

<!-- Ground shadow -->
<ellipse cx="200" cy="405" rx="115" ry="14" fill="#D08060" opacity="0.16"/>

<!-- === BASKET (right side) === -->
