<rect x="193" y="220" width="14" height="30" rx="5" fill="#D0D0D8" stroke="#A0A0B0" stroke-width="1.8"/>
<rect x="207" y="217" width="22" height="8" rx="4" fill="#B8B8C4" stroke="#909098" stroke-width="1.8"/>
<!-- Faucet highlight -->
<rect x="195" y="222" width="5" height="16" rx="2.5" fill="white" opacity="0.4"/>

<!-- Water stream -->
<path d="M197,246 Q196,268 197,280" fill="none" stroke="#78C0E8" stroke-width="7" stroke-linecap="round" opacity="0.85"/>
<path d="M203,246 Q204,268 203,280" fill="none" stroke="#78C0E8" stroke-width="4" stroke-linecap="round" opacity="0.6"/>

<!-- === BERRYBOT === -->
