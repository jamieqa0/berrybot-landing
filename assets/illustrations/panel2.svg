  <path d="M237,268 L262,300" stroke="url(#p2-body)" stroke-width="20" stroke-linecap="round"/>
  <circle cx="270" cy="308" r="14" fill="#FF3355" stroke="#AA0022" stroke-width="2.5"/>

  <!-- Leaf crown -->
