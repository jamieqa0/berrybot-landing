  <path d="M147,163 C149,146 158,133 163,141" fill="none" stroke="#A5D6A7" stroke-width="2" stroke-linecap="round"/>
  <path d="M180,151 C182,138 188,132 190,139" fill="none" stroke="#A5D6A7" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Face -->
  <ellipse cx="166" cy="214" rx="42" ry="33" fill="url(#p2-face)"/>

  <!-- Heart eyes -->
  <path d="M138,206 C138,200 144,197 147,202 C150,197 156,200 156,206 C156,212 147,219 147,219 C147,219 138,212 138,206 Z" fill="#FF3355"/>
  <path d="M170,206 C170,200 176,197 179,202 C182,197 188,200 188,206 C188,212 179,219 179,219 C179,219 170,212 170,206 Z" fill="#FF3355"/>
  <!-- Heart highlights -->
  <circle cx="143" cy="202" r="2.5" fill="white" opacity="0.6"/>
  <circle cx="175" cy="202" r="2.5" fill="white" opacity="0.6"/>

  <!-- Happy mouth -->
  <path d="M152,228 Q166,242 180,228" fill="none" stroke="#AA0022" stroke-width="3.2" stroke-linecap="round"/>

  <!-- Cheeks -->
  <ellipse cx="130" cy="224" rx="13" ry="8" fill="#FFB3C1" opacity="0.65"/>
  <ellipse cx="202" cy="224" rx="13" ry="8" fill="#FFB3C1" opacity="0.65"/>
</g>

