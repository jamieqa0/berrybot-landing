<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" font-family="'Apple SD Gothic Neo','Noto Sans KR',Arial,sans-serif">
<defs>
  <radialGradient id="p2-body" cx="36%" cy="30%" r="70%">
    <stop offset="0%" stop-color="#FF7090"/>
    <stop offset="55%" stop-color="#FF3355"/>
    <stop offset="100%" stop-color="#BB0030"/>
  </radialGradient>
  <radialGradient id="p2-bg" cx="50%" cy="20%" r="90%">
    <stop offset="0%" stop-color="#F0F8FF"/>
    <stop offset="100%" stop-color="#D8EEFF"/>
  </radialGradient>
  <radialGradient id="p2-face" cx="38%" cy="32%" r="68%">
    <stop offset="0%" stop-color="#FFE8EE"/>
    <stop offset="100%" stop-color="#FFBCCC"/>
  </radialGradient>
  <linearGradient id="p2-leaf" x1="0" y1="0" x2="0.2" y2="1">
    <stop offset="0%" stop-color="#76C442"/>
    <stop offset="100%" stop-color="#2E7D32"/>
  </linearGradient>
  <linearGradient id="p2-water" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#90D0F0"/>
    <stop offset="100%" stop-color="#5AAAD8"/>
  </linearGradient>
  <filter id="p2-drop" x="-25%" y="-15%" width="150%" height="145%">
    <feDropShadow dx="3" dy="8" stdDeviation="9" flood-color="#AA002240"/>
  </filter>
  <filter id="p2-soft" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="1" dy="3" stdDeviation="5" flood-color="#00000020"/>
  </filter>
</defs>

<!-- Background -->
<rect width="400" height="500" rx="20" fill="url(#p2-bg)"/>
<!-- Bubble decorations -->
<circle cx="38" cy="48" r="9" fill="#B0D8F8" opacity="0.38"/>
<circle cx="350" cy="35" r="6" fill="#B0D8F8" opacity="0.35"/>
<circle cx="375" cy="110" r="8" fill="#B0D8F8" opacity="0.3"/>
