<circle cx="55" cy="155" r="5" fill="#B0D8F8" opacity="0.28"/>
<circle cx="340" cy="160" r="5.5" fill="#B0D8F8" opacity="0.25"/>
<!-- Border -->
<rect x="3" y="3" width="394" height="494" rx="18" fill="none" stroke="#A8D8F8" stroke-width="2.5"/>

<!-- Ground shadow -->
<ellipse cx="200" cy="405" rx="115" ry="14" fill="#6090B0" opacity="0.14"/>

<!-- Faucet -->
