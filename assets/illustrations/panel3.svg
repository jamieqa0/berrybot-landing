<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" font-family="'Apple SD Gothic Neo','Noto Sans KR',Arial,sans-serif">
<defs>
  <radialGradient id="p3-body" cx="36%" cy="30%" r="70%">
    <stop offset="0%" stop-color="#FF7090"/>
    <stop offset="55%" stop-color="#FF3355"/>
    <stop offset="100%" stop-color="#BB0030"/>
  </radialGradient>
  <radialGradient id="p3-bg" cx="60%" cy="20%" r="90%">
    <stop offset="0%" stop-color="#FFFCF0"/>
    <stop offset="100%" stop-color="#FFF0C8"/>
  </radialGradient>
  <radialGradient id="p3-face" cx="38%" cy="32%" r="68%">
    <stop offset="0%" stop-color="#FFE8EE"/>
    <stop offset="100%" stop-color="#FFBCCC"/>
  </radialGradient>
  <linearGradient id="p3-leaf" x1="0" y1="0" x2="0.2" y2="1">
    <stop offset="0%" stop-color="#76C442"/>
    <stop offset="100%" stop-color="#2E7D32"/>
  </linearGradient>
  <radialGradient id="p3-lamp" cx="50%" cy="0%" r="100%">
    <stop offset="0%" stop-color="#FFE870"/>
    <stop offset="100%" stop-color="#FFC020" stop-opacity="0"/>
  </radialGradient>
  <filter id="p3-drop" x="-25%" y="-15%" width="150%" height="145%">
    <feDropShadow dx="3" dy="8" stdDeviation="9" flood-color="#AA002240"/>
  </filter>
  <filter id="p3-soft" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="1" dy="3" stdDeviation="5" flood-color="#00000020"/>
  </filter>
  <filter id="p3-glow">
    <feGaussianBlur stdDeviation="6" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
</defs>

<!-- Background -->
<rect width="400" height="500" rx="20" fill="url(#p3-bg)"/>
<!-- Decorative dots -->
<circle cx="34" cy="45" r="5" fill="#FFE0A0" opacity="0.55"/>
<circle cx="95" cy="25" r="3.5" fill="#FFE0A0" opacity="0.45"/>
<circle cx="335" cy="38" r="4.5" fill="#FFE0A0" opacity="0.55"/>
<circle cx="372" cy="78" r="3" fill="#FFE0A0" opacity="0.45"/>
<circle cx="25" cy="145" r="3" fill="#FFE0A0" opacity="0.38"/>
<circle cx="376" cy="122" r="4" fill="#FFE0A0" opacity="0.35"/>
<!-- Border -->
<rect x="3" y="3" width="394" height="494" rx="18" fill="none" stroke="#FFE0A0" stroke-width="2.5"/>

<!-- Ground shadow -->
<ellipse cx="200" cy="405" rx="115" ry="14" fill="#B08040" opacity="0.15"/>

<!-- Inspection lamp glow -->
<ellipse cx="316" cy="155" rx="60" ry="80" fill="url(#p3-lamp)" opacity="0.4"/>

<!-- Inspection lamp -->
<rect x="310" y="28" width="12" height="44" rx="5" fill="#C0C0C8" stroke="#909098" stroke-width="1.8"/>
<path d="M300,72 L368,72 L354,112 L314,112 Z" fill="#FFD700" stroke="#B89000" stroke-width="2"/>
<!-- Lamp highlight -->
<path d="M306,76 L362,76" stroke="#FFE870" stroke-width="2" opacity="0.7"/>
<ellipse cx="334" cy="112" rx="22" ry="7" fill="#FFE870" opacity="0.55" filter="url(#p3-glow)"/>

<!-- Work table -->
<rect x="36" y="325" width="328" height="52" rx="10" fill="#D4A460" stroke="#9A7028" stroke-width="2.5"/>
<rect x="36" y="325" width="328" height="15" rx="7" fill="#BE8E44"/>
<!-- Table highlight -->
<path d="M46,330 L354,330" stroke="#E8C070" stroke-width="1.5" opacity="0.5"/>

<!-- Strawberries on table -->
<ellipse cx="80" cy="320" rx="17" ry="14" fill="#FF3355" stroke="#CC1133" stroke-width="2"/>
<path d="M80,306 C73,298 68,300 71,306 C72,298 80,295 80,301 C80,295 88,298 89,306 C92,300 87,298 80,306" fill="#4CAF50" stroke="#2E7D32" stroke-width="1.5"/>
<ellipse cx="75" cy="317" rx="3.2" ry="2.3" fill="#FFE14D" stroke="#CCA800" stroke-width="0.9" transform="rotate(-12,75,317)"/>
<ellipse cx="84" cy="314" rx="3.2" ry="2.3" fill="#FFE14D" stroke="#CCA800" stroke-width="0.9"/>
<!-- OK badge -->
<circle cx="80" cy="298" r="8" fill="#22CC55" stroke="white" stroke-width="1.8"/>
<text x="80" y="302" text-anchor="middle" fill="white" font-size="9" font-weight="bold">✓</text>

<ellipse cx="118" cy="320" rx="16" ry="13" fill="#FF4466" stroke="#CC1133" stroke-width="2"/>
<path d="M118,307 C111,299 106,301 109,307 C110,299 118,296 118,302 C118,296 126,299 127,307 C130,301 125,299 118,307" fill="#4CAF50" stroke="#2E7D32" stroke-width="1.5"/>
<ellipse cx="114" cy="317" rx="3" ry="2.2" fill="#FFE14D" stroke="#CCA800" stroke-width="0.9"/>
<ellipse cx="122" cy="315" rx="3" ry="2.2" fill="#FFE14D" stroke="#CCA800" stroke-width="0.9" transform="rotate(10,122,315)"/>
<circle cx="118" cy="299" r="8" fill="#22CC55" stroke="white" stroke-width="1.8"/>
<text x="118" y="303" text-anchor="middle" fill="white" font-size="9" font-weight="bold">✓</text>

<!-- Strawberry being inspected (under magnifying glass) -->
<ellipse cx="156" cy="319" rx="16" ry="13" fill="#FF3355" stroke="#CC1133" stroke-width="2"/>
<path d="M156,306 C149,298 144,300 147,306 C148,298 156,295 156,301 C156,295 164,298 165,306 C168,300 163,298 156,306" fill="#4CAF50" stroke="#2E7D32" stroke-width="1.5"/>
<path d="M148,318 L154,325 L166,309" fill="none" stroke="#22CC55" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/>

<!-- Magnifying glass -->
<rect x="252" y="256" width="12" height="58" rx="5" fill="#9A5828" stroke="#6A3810" stroke-width="2" transform="rotate(32,258,285)"/>
<circle cx="230" cy="248" r="34" fill="none" stroke="#D0D0D8" stroke-width="7"/>
<circle cx="230" cy="248" r="30" fill="#EEF6FF" fill-opacity="0.65" stroke="#C0C0C8" stroke-width="2"/>
<!-- Lens reflection -->
<path d="M213,230 Q220,224 232,226" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.85"/>
<!-- Strawberry in magnifying glass (enlarged) -->
<ellipse cx="230" cy="252" rx="20" ry="17" fill="#FF3355" stroke="#CC1133" stroke-width="2"/>
<path d="M230,235 C223,226 217,228 220,235 C221,226 230,223 230,229 C230,223 239,226 240,235 C243,228 237,226 230,235" fill="#4CAF50" stroke="#2E7D32" stroke-width="1.5"/>
<ellipse cx="223" cy="249" rx="4.5" ry="3.2" fill="#FFE14D" stroke="#CCA800" stroke-width="1" transform="rotate(-8,223,249)"/>
<ellipse cx="234" cy="245" rx="4.5" ry="3.2" fill="#FFE14D" stroke="#CCA800" stroke-width="1" transform="rotate(8,234,245)"/>
<ellipse cx="238" cy="256" rx="4" ry="2.8" fill="#FFE14D" stroke="#CCA800" stroke-width="1" transform="rotate(-12,238,256)"/>

<!-- === BERRYBOT === -->
<g filter="url(#p3-drop)">
  <!-- Legs -->
  <rect x="148" y="376" width="16" height="28" rx="8" fill="#B8B8C8" stroke="#909098" stroke-width="2"/>
  <rect x="172" y="376" width="16" height="28" rx="8" fill="#B8B8C8" stroke="#909098" stroke-width="2"/>
  <!-- Feet -->
  <ellipse cx="156" cy="404" rx="14" ry="8.5" fill="#909098" stroke="#686870" stroke-width="1.8"/>
  <ellipse cx="180" cy="404" rx="14" ry="8.5" fill="#909098" stroke="#686870" stroke-width="1.8"/>

  <!-- Body -->
  <path d="M166,178 C114,183 92,222 94,268 C96,314 129,356 166,368 C203,356 236,314 238,268 C240,222 218,183 166,178" fill="url(#p3-body)" stroke="#AA0022" stroke-width="3"/>

  <!-- Apron -->
  <path d="M122,268 Q166,258 210,268 Q207,326 166,340 Q125,326 122,268" fill="white" fill-opacity="0.80" stroke="#FFD8E0" stroke-width="1.5"/>
  <ellipse cx="150" cy="290" rx="5.5" ry="7" fill="#FF3355" opacity="0.38"/>
  <ellipse cx="167" cy="283" rx="4.5" ry="6" fill="#FF3355" opacity="0.28"/>
  <ellipse cx="182" cy="296" rx="4.5" ry="6" fill="#FF3355" opacity="0.28"/>

  <!-- Seeds -->
  <ellipse cx="132" cy="232" rx="6" ry="4.1" fill="#FFE14D" stroke="#CCA800" stroke-width="1.5" transform="rotate(-20,132,232)"/>
  <ellipse cx="160" cy="218" rx="6" ry="4.1" fill="#FFE14D" stroke="#CCA800" stroke-width="1.5" transform="rotate(-5,160,218)"/>
  <ellipse cx="192" cy="226" rx="6" ry="4.1" fill="#FFE14D" stroke="#CCA800" stroke-width="1.5" transform="rotate(15,192,226)"/>
  <ellipse cx="123" cy="268" rx="5" ry="3.4" fill="#FFE14D" stroke="#CCA800" stroke-width="1.5" transform="rotate(-15,123,268)"/>
  <ellipse cx="208" cy="264" rx="5" ry="3.4" fill="#FFE14D" stroke="#CCA800" stroke-width="1.5" transform="rotate(20,208,264)"/>

  <!-- Left arm (resting) -->
  <path d="M95,272 L65,298" stroke="url(#p3-body)" stroke-width="20" stroke-linecap="round"/>
  <circle cx="57" cy="305" r="14" fill="#FF3355" stroke="#AA0022" stroke-width="2.5"/>
  <!-- Right arm (holding magnifying glass up) -->
  <path d="M237,262 L248,244" stroke="url(#p3-body)" stroke-width="20" stroke-linecap="round"/>
  <circle cx="252" cy="236" r="14" fill="#FF3355" stroke="#AA0022" stroke-width="2.5"/>

  <!-- Leaf crown -->
  <path d="M126,185 C124,155 138,138 149,156 C149,134 160,121 168,139 C174,122 186,132 181,151 C191,135 204,145 198,164 C208,153 220,164 212,183 L166,186 Z" fill="url(#p3-leaf)" stroke="#1B5E20" stroke-width="2.2"/>
  <path d="M147,163 C149,146 158,133 163,141" fill="none" stroke="#A5D6A7" stroke-width="2" stroke-linecap="round"/>
  <path d="M180,151 C182,138 188,132 190,139" fill="none" stroke="#A5D6A7" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Face -->
  <ellipse cx="166" cy="214" rx="42" ry="33" fill="url(#p3-face)"/>

  <!-- Eyes (one open, one squinted — concentrating) -->
  <circle cx="150" cy="208" r="13" fill="white" stroke="#222" stroke-width="2.2"/>
  <circle cx="152" cy="210" r="7.5" fill="#1A1A1A"/>
  <circle cx="155" cy="206" r="3.5" fill="white"/>
  <!-- Squinted right eye -->
  <path d="M170,207 Q182,200 194,207" fill="none" stroke="#222" stroke-width="3" stroke-linecap="round"/>
  <path d="M172,210 Q182,215 192,210" fill="none" stroke="#222" stroke-width="2" stroke-linecap="round"/>

  <!-- Determined mouth -->
  <path d="M154,228 Q166,234 178,228" fill="none" stroke="#AA0022" stroke-width="2.8" stroke-linecap="round"/>

  <!-- Cheeks -->
  <ellipse cx="130" cy="222" rx="13" ry="8" fill="#FFB3C1" opacity="0.65"/>
  <ellipse cx="202" cy="222" rx="13" ry="8" fill="#FFB3C1" opacity="0.65"/>
</g>

<!-- Speech bubble -->
<path d="M16,38 Q16,18 36,18 L218,18 Q238,18 238,38 L238,88 Q238,108 218,108 L108,108 L96,124 L90,108 Q16,108 16,88 Z" fill="white" stroke="#FFE0A0" stroke-width="2.2" filter="url(#p3-soft)"/>
<text x="127" y="56" text-anchor="middle" font-size="13.5" font-weight="bold" fill="#333">흠... 완벽해!</text>
<text x="127" y="78" text-anchor="middle" font-size="13" font-weight="bold" fill="#CC8800">⭐ 검수 완료 ⭐</text>

<!-- Sparkles near magnifying glass -->
<text x="268" y="218" font-size="16" fill="#FFB800" opacity="0.8">✨</text>
<text x="286" y="252" font-size="12" fill="#FFB800" opacity="0.7">⭐</text>
<text x="352" y="128" font-size="18" fill="#FFB800" opacity="0.5">✨</text>

<!-- Panel number -->
<circle cx="32" cy="32" r="20" fill="#FF3355" stroke="white" stroke-width="2.8" filter="url(#p3-soft)"/>
<text x="32" y="38" text-anchor="middle" fill="white" font-size="15" font-weight="bold">3</text>

<!-- Bottom caption -->
<rect x="0" y="420" width="400" height="80" rx="0" fill="white" fill-opacity="0.55"/>
<rect x="0" y="420" width="400" height="3" fill="#FF8800" fill-opacity="0.38"/>
<text x="200" y="452" text-anchor="middle" fill="#CC6600" font-size="20" font-weight="bold">예쁘게 다듬어볼게! ⭐</text>
<text x="200" y="474" text-anchor="middle" fill="#AA8860" font-size="12">AI가 꼭지 위치를 감지해 정밀 제거</text>
</svg>
