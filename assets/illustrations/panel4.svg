<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" font-family="Arial, sans-serif">
  <!-- Panel border + background -->
  <rect x="2" y="2" width="396" height="496" rx="12" fill="#FFF5FF" stroke="#333" stroke-width="4"/>

  <!-- === BACKGROUND (bright celebratory) === -->
  <rect x="4" y="4" width="392" height="388" rx="10" fill="#FFF0FF"/>
  <!-- Confetti -->
  <rect x="45" y="40" width="10" height="6" rx="2" fill="#FF3355" opacity="0.7" transform="rotate(25,50,43)"/>
  <rect x="80" y="65" width="8" height="5" rx="2" fill="#FFE14D" opacity="0.7" transform="rotate(-15,84,67)"/>
  <rect x="310" y="35" width="9" height="6" rx="2" fill="#4CAF50" opacity="0.7" transform="rotate(40,314,38)"/>
  <rect x="345" y="70" width="10" height="5" rx="2" fill="#3399CC" opacity="0.7" transform="rotate(-20,350,72)"/>
  <rect x="30" y="120" width="8" height="5" rx="2" fill="#FF8800" opacity="0.6" transform="rotate(30,34,122)"/>
  <rect x="355" y="120" width="9" height="5" rx="2" fill="#FF3355" opacity="0.6" transform="rotate(-35,359,122)"/>
  <rect x="60" y="170" width="7" height="5" rx="2" fill="#FFE14D" opacity="0.5" transform="rotate(15,63,172)"/>
  <rect x="330" y="165" width="8" height="5" rx="2" fill="#4CAF50" opacity="0.5" transform="rotate(-25,334,167)"/>
  <circle cx="50" cy="95" r="5" fill="#FF3355" opacity="0.5"/>
  <circle cx="340" cy="90" r="4" fill="#FFE14D" opacity="0.5"/>
  <circle cx="370" cy="150" r="5" fill="#4CAF50" opacity="0.5"/>
  <circle cx="25" cy="155" r="4" fill="#3399CC" opacity="0.5"/>
  <!-- Stars -->
  <text x="28" y="78" font-size="18" fill="#FFB800" opacity="0.8">⭐</text>
  <text x="348" y="55" font-size="14" fill="#FFB800" opacity="0.7">⭐</text>
  <text x="358" y="180" font-size="16" fill="#FFB800" opacity="0.6">✨</text>
  <text x="22" y="185" font-size="14" fill="#FFB800" opacity="0.6">✨</text>
  <!-- Hearts -->
  <text x="55" y="55" font-size="16" fill="#FF3355" opacity="0.6">♥</text>
  <text x="320" y="155" font-size="14" fill="#FF3355" opacity="0.6">♥</text>

  <!-- Floor -->
  <rect x="4" y="388" width="392" height="110" fill="#C8845A"/>
  <rect x="4" y="388" width="392" height="16" fill="#A06040"/>

  <!-- === BOWL OF STRAWBERRIES (presented by BerryBot) === -->
  <!-- Bowl -->
  <ellipse cx="200" cy="335" rx="80" ry="20" fill="#F5F5DC" stroke="#CCC" stroke-width="2.5"/>
  <path d="M 120,318 Q 125,360 200,365 Q 275,360 280,318 Z" fill="#F5F5DC" stroke="#CCC" stroke-width="2.5"/>
  <ellipse cx="200" cy="318" rx="80" ry="18" fill="#EAEAC8" stroke="#CCC" stroke-width="2"/>
  <!-- Bowl rim highlight -->
  <path d="M 130,312 Q 200,305 270,312" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.6"/>

  <!-- Strawberries in bowl (no stems!) -->
  <!-- Row back -->
  <ellipse cx="165" cy="308" rx="18" ry="14" fill="#FF4466" stroke="#CC1133" stroke-width="2"/>
  <ellipse cx="172" cy="304" rx="4" ry="3" fill="#FFE14D" stroke="#CCA800" stroke-width="1" transform="rotate(-10,172,304)"/>
  <ellipse cx="160" cy="308" rx="3.5" ry="2.5" fill="#FFE14D" stroke="#CCA800" stroke-width="1"/>
  <ellipse cx="170" cy="313" rx="3.5" ry="2.5" fill="#FFE14D" stroke="#CCA800" stroke-width="1" transform="rotate(10,170,313)"/>

  <ellipse cx="200" cy="304" rx="18" ry="14" fill="#FF3355" stroke="#CC1133" stroke-width="2"/>
  <ellipse cx="206" cy="300" rx="4" ry="3" fill="#FFE14D" stroke="#CCA800" stroke-width="1" transform="rotate(5,206,300)"/>
  <ellipse cx="196" cy="305" rx="3.5" ry="2.5" fill="#FFE14D" stroke="#CCA800" stroke-width="1"/>
  <ellipse cx="205" cy="310" rx="3.5" ry="2.5" fill="#FFE14D" stroke="#CCA800" stroke-width="1" transform="rotate(-10,205,310)"/>

  <ellipse cx="235" cy="308" rx="17" ry="14" fill="#FF4466" stroke="#CC1133" stroke-width="2"/>
  <ellipse cx="241" cy="304" rx="3.5" ry="2.5" fill="#FFE14D" stroke="#CCA800" stroke-width="1" transform="rotate(10,241,304)"/>
  <ellipse cx="231" cy="308" rx="3.5" ry="2.5" fill="#FFE14D" stroke="#CCA800" stroke-width="1"/>

  <!-- Row front -->
  <ellipse cx="180" cy="320" rx="19" ry="14" fill="#FF3355" stroke="#CC1133" stroke-width="2"/>
  <ellipse cx="186" cy="316" rx="4" ry="3" fill="#FFE14D" stroke="#CCA800" stroke-width="1"/>
  <ellipse cx="176" cy="320" rx="3.5" ry="2.5" fill="#FFE14D" stroke="#CCA800" stroke-width="1" transform="rotate(-15,176,320)"/>
  <ellipse cx="186" cy="325" rx="3.5" ry="2.5" fill="#FFE14D" stroke="#CCA800" stroke-width="1" transform="rotate(10,186,325)"/>

  <ellipse cx="218" cy="318" rx="19" ry="14" fill="#FF4466" stroke="#CC1133" stroke-width="2"/>
  <ellipse cx="224" cy="314" rx="4" ry="3" fill="#FFE14D" stroke="#CCA800" stroke-width="1" transform="rotate(5,224,314)"/>
  <ellipse cx="213" cy="319" rx="3.5" ry="2.5" fill="#FFE14D" stroke="#CCA800" stroke-width="1"/>
  <ellipse cx="222" cy="324" rx="3.5" ry="2.5" fill="#FFE14D" stroke="#CCA800" stroke-width="1" transform="rotate(-10,222,324)"/>

  <!-- Completion sparkle on bowl -->
  <text x="268" y="305" font-size="20" fill="#FFB800">✨</text>

  <!-- === BERRYBOT === -->
  <!-- Legs -->
  <rect x="142" y="372" width="18" height="30" rx="8" fill="#888" stroke="#555" stroke-width="2.5"/>
  <rect x="168" y="372" width="18" height="30" rx="8" fill="#888" stroke="#555" stroke-width="2.5"/>
  <!-- Feet -->
  <ellipse cx="151" cy="402" rx="14" ry="8" fill="#555" stroke="#333" stroke-width="2"/>
  <ellipse cx="177" cy="402" rx="14" ry="8" fill="#555" stroke="#333" stroke-width="2"/>

  <!-- Body -->
  <path d="M 164,188 C 112,193 91,233 93,278 C 95,323 128,364 164,376 C 200,364 233,323 235,278 C 237,233 216,193 164,188" fill="#FF3355" stroke="#CC1133" stroke-width="3.5"/>

  <!-- Seeds -->
  <ellipse cx="136" cy="240" rx="6" ry="4" fill="#FFE14D" stroke="#CCA800" stroke-width="1.5" transform="rotate(-20,136,240)"/>
  <ellipse cx="162" cy="226" rx="6" ry="4" fill="#FFE14D" stroke="#CCA800" stroke-width="1.5" transform="rotate(-5,162,226)"/>
  <ellipse cx="190" cy="234" rx="6" ry="4" fill="#FFE14D" stroke="#CCA800" stroke-width="1.5" transform="rotate(15,190,234)"/>
  <ellipse cx="128" cy="272" rx="5" ry="3.5" fill="#FFE14D" stroke="#CCA800" stroke-width="1.5" transform="rotate(-15,128,272)"/>
  <ellipse cx="203" cy="268" rx="5" ry="3.5" fill="#FFE14D" stroke="#CCA800" stroke-width="1.5" transform="rotate(20,203,268)"/>

  <!-- Both arms extended forward holding bowl -->
  <path d="M 98,285 L 68,310" stroke="#FF3355" stroke-width="16" stroke-linecap="round"/>
  <circle cx="62" cy="315" r="12" fill="#FF3355" stroke="#CC1133" stroke-width="2.5"/>
  <path d="M 230,285 L 260,310" stroke="#FF3355" stroke-width="16" stroke-linecap="round"/>
  <circle cx="266" cy="315" r="12" fill="#FF3355" stroke="#CC1133" stroke-width="2.5"/>

  <!-- Leaf crown -->
  <path d="M 128,195 C 126,166 140,151 150,167 C 150,148 161,137 169,153 C 174,138 185,147 180,165 C 189,150 202,159 197,178 C 206,167 216,177 208,194 L 164,197 Z" fill="#4CAF50" stroke="#2E7D32" stroke-width="2.5"/>
  <path d="M 149,176 C 151,161 160,150 165,156" fill="none" stroke="#81C784" stroke-width="2" stroke-linecap="round"/>

  <!-- Face bg -->
  <ellipse cx="164" cy="222" rx="38" ry="30" fill="#FFD0D8"/>

  <!-- Eyes (happy closed crescents - satisfied!) -->
  <!-- Left eye -->
  <path d="M 140,218 Q 150,208 160,218" fill="none" stroke="#333" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Right eye -->
  <path d="M 168,218 Q 178,208 188,218" fill="none" stroke="#333" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Eye sparkles -->
  <circle cx="140" cy="218" r="2" fill="#FFB800" opacity="0.8"/>
  <circle cx="160" cy="218" r="2" fill="#FFB800" opacity="0.8"/>
  <circle cx="168" cy="218" r="2" fill="#FFB800" opacity="0.8"/>
  <circle cx="188" cy="218" r="2" fill="#FFB800" opacity="0.8"/>

  <!-- Big satisfied smile -->
  <path d="M 149,234 Q 164,250 179,234" fill="none" stroke="#CC1133" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Cheeks (extra rosy, proud!) -->
  <ellipse cx="135" cy="230" rx="12" ry="8" fill="#FFB3C1" opacity="0.8"/>
  <ellipse cx="193" cy="230" rx="12" ry="8" fill="#FFB3C1" opacity="0.8"/>

  <!-- === SPEECH BUBBLE === -->
  <path d="M 12,42 Q 380,42 380,95 Q 380,148 240,148 Q 228,148 218,162 L 212,148 Q 12,148 12,95 Z" fill="white" stroke="#333" stroke-width="3"/>
  <text x="196" y="82" text-anchor="middle" fill="#333" font-size="12.5" font-weight="bold">꼭지까지 완벽하게!</text>
  <text x="196" y="106" text-anchor="middle" fill="#FF3355" font-size="12.5" font-weight="bold">베리봇 임무 완료~ 🎉</text>

  <!-- Panel number badge -->
  <circle cx="28" cy="28" r="20" fill="#FF3355" stroke="#CC1133" stroke-width="3"/>
  <text x="28" y="34" text-anchor="middle" fill="white" font-size="15" font-weight="bold">4</text>

  <!-- Extra celebration effects -->
  <text x="342" y="290" font-size="20" fill="#FF3355" opacity="0.7">🎉</text>
  <text x="22" y="290" font-size="18" fill="#FF3355" opacity="0.7">🎉</text>

  <!-- === BOTTOM TITLE === -->
  <line x1="10" y1="420" x2="390" y2="420" stroke="#FF3355" stroke-width="2.5" stroke-dasharray="8,4"/>
  <text x="200" y="455" text-anchor="middle" fill="#CC1133" font-size="20" font-weight="bold">짜잔~ 드세요! 🎉</text>
  <text x="200" y="480" text-anchor="middle" fill="#999" font-size="12">꼭지 제거 완료, 베리봇 임무 완료!</text>
</svg>
