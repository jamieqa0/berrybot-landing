<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" font-family="'Apple SD Gothic Neo','Noto Sans KR',Arial,sans-serif">
<defs>
  <radialGradient id="p4-body" cx="36%" cy="30%" r="70%">
    <stop offset="0%" stop-color="#FF7090"/>
    <stop offset="55%" stop-color="#FF3355"/>
    <stop offset="100%" stop-color="#BB0030"/>
  </radialGradient>
  <radialGradient id="p4-bg" cx="50%" cy="25%" r="88%">
    <stop offset="0%" stop-color="#FFF5FF"/>
    <stop offset="100%" stop-color="#FFE0F0"/>
  </radialGradient>
  <radialGradient id="p4-face" cx="38%" cy="32%" r="68%">
    <stop offset="0%" stop-color="#FFE8EE"/>
    <stop offset="100%" stop-color="#FFBCCC"/>
  </radialGradient>
  <linearGradient id="p4-leaf" x1="0" y1="0" x2="0.2" y2="1">
    <stop offset="0%" stop-color="#76C442"/>
    <stop offset="100%" stop-color="#2E7D32"/>
  </linearGradient>
  <radialGradient id="p4-bowl" cx="35%" cy="20%" r="80%">
    <stop offset="0%" stop-color="#F8F4E8"/>
    <stop offset="100%" stop-color="#DEDAD0"/>
  </radialGradient>
  <filter id="p4-drop" x="-25%" y="-15%" width="150%" height="145%">
    <feDropShadow dx="3" dy="8" stdDeviation="9" flood-color="#AA002240"/>
  </filter>
  <filter id="p4-soft" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="1" dy="3" stdDeviation="5" flood-color="#00000020"/>
  </filter>
  <filter id="p4-bowlshadow" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="2" dy="5" stdDeviation="7" flood-color="#00000025"/>
  </filter>
</defs>

<!-- Background -->
<rect width="400" height="500" rx="20" fill="url(#p4-bg)"/>
<!-- Confetti -->
<rect x="42" y="38" width="11" height="7" rx="2.5" fill="#FF3355" opacity="0.65" transform="rotate(28,47,41)"/>
<rect x="82" y="62" width="9" height="6" rx="2" fill="#FFE14D" opacity="0.65" transform="rotate(-18,86,65)"/>
<rect x="316" y="32" width="10" height="7" rx="2.5" fill="#4CAF50" opacity="0.65" transform="rotate(42,321,35)"/>
<rect x="350" y="68" width="11" height="6" rx="2" fill="#6699EE" opacity="0.65" transform="rotate(-22,355,71)"/>
<rect x="28" y="118" width="9" height="6" rx="2" fill="#FF8800" opacity="0.55" transform="rotate(32,32,121)"/>
<rect x="358" y="115" width="10" height="6" rx="2" fill="#FF3355" opacity="0.55" transform="rotate(-38,363,118)"/>
<rect x="58" y="168" width="8" height="5" rx="2" fill="#FFE14D" opacity="0.5" transform="rotate(18,62,170)"/>
<rect x="334" y="162" width="9" height="6" rx="2" fill="#4CAF50" opacity="0.5" transform="rotate(-28,338,165)"/>
<!-- Circles confetti -->
<circle cx="48" cy="92" r="5.5" fill="#FF3355" opacity="0.45"/>
<circle cx="345" cy="88" r="4.5" fill="#FFE14D" opacity="0.45"/>
<circle cx="372" cy="148" r="5.5" fill="#4CAF50" opacity="0.45"/>
<circle cx="24" cy="152" r="4.5" fill="#6699EE" opacity="0.45"/>
<!-- Stars -->
<text x="26" y="76" font-size="18" fill="#FFB800" opacity="0.75">⭐</text>
<text x="352" y="52" font-size="14" fill="#FFB800" opacity="0.7">⭐</text>
<text x="360" y="178" font-size="16" fill="#FFB800" opacity="0.55">✨</text>
<text x="20" y="182" font-size="14" fill="#FFB800" opacity="0.55">✨</text>
<!-- Hearts -->
<text x="54" y="52" font-size="16" fill="#FF3355" opacity="0.55">♥</text>
<text x="325" y="152" font-size="14" fill="#FF3355" opacity="0.55">♥</text>

<!-- Border -->
<rect x="3" y="3" width="394" height="494" rx="18" fill="none" stroke="#FFD0E8" stroke-width="2.5"/>

<!-- Ground shadow -->
<ellipse cx="200" cy="405" rx="115" ry="14" fill="#B06080" opacity="0.14"/>

<!-- === BERRYBOT === -->
<g filter="url(#p4-drop)">
  <!-- Legs -->
  <rect x="148" y="368" width="16" height="28" rx="8" fill="#B8B8C8" stroke="#909098" stroke-width="2"/>
  <rect x="172" y="368" width="16" height="28" rx="8" fill="#B8B8C8" stroke="#909098" stroke-width="2"/>
  <!-- Feet -->
  <ellipse cx="156" cy="396" rx="14" ry="8.5" fill="#909098" stroke="#686870" stroke-width="1.8"/>
  <ellipse cx="180" cy="396" rx="14" ry="8.5" fill="#909098" stroke="#686870" stroke-width="1.8"/>

  <!-- Body -->
  <path d="M166,178 C114,183 92,222 94,268 C96,314 129,356 166,368 C203,356 236,314 238,268 C240,222 218,183 166,178" fill="url(#p4-body)" stroke="#AA0022" stroke-width="3"/>

  <!-- Apron -->
  <path d="M122,268 Q166,258 210,268 Q207,326 166,340 Q125,326 122,268" fill="white" fill-opacity="0.80" stroke="#FFD8E0" stroke-width="1.5"/>
  <ellipse cx="150" cy="290" rx="5.5" ry="7" fill="#FF3355" opacity="0.38"/>
  <ellipse cx="167" cy="283" rx="4.5" ry="6" fill="#FF3355" opacity="0.28"/>
  <ellipse cx="182" cy="296" rx="4.5" ry="6" fill="#FF3355" opacity="0.28"/>

  <!-- Seeds -->
  <ellipse cx="132" cy="232" rx="6" ry="4.1" fill="#FFE14D" stroke="#CCA800" stroke-width="1.5" transform="rotate(-20,132,232)"/>
  <ellipse cx="160" cy="218" rx="6" ry="4.1" fill="#FFE14D" stroke="#CCA800" stroke-width="1.5" transform="rotate(-5,160,218)"/>
  <ellipse cx="192" cy="226" rx="6" ry="4.1" fill="#FFE14D" stroke="#CCA800" stroke-width="1.5" transform="rotate(15,192,226)"/>
  <ellipse cx="123" cy="268" rx="5" ry="3.4" fill="#FFE14D" stroke="#CCA800" stroke-width="1.5" transform="rotate(-15,123,268)"/>
  <ellipse cx="208" cy="264" rx="5" ry="3.4" fill="#FFE14D" stroke="#CCA800" stroke-width="1.5" transform="rotate(20,208,264)"/>

  <!-- Arms extended forward (holding bowl) -->
  <path d="M95,278 L65,300" stroke="url(#p4-body)" stroke-width="20" stroke-linecap="round"/>
  <circle cx="57" cy="306" r="14" fill="#FF3355" stroke="#AA0022" stroke-width="2.5"/>
  <path d="M237,278 L267,300" stroke="url(#p4-body)" stroke-width="20" stroke-linecap="round"/>
  <circle cx="275" cy="306" r="14" fill="#FF3355" stroke="#AA0022" stroke-width="2.5"/>

  <!-- Leaf crown -->
  <path d="M126,185 C124,155 138,138 149,156 C149,134 160,121 168,139 C174,122 186,132 181,151 C191,135 204,145 198,164 C208,153 220,164 212,183 L166,186 Z" fill="url(#p4-leaf)" stroke="#1B5E20" stroke-width="2.2"/>
  <path d="M147,163 C149,146 158,133 163,141" fill="none" stroke="#A5D6A7" stroke-width="2" stroke-linecap="round"/>
  <path d="M180,151 C182,138 188,132 190,139" fill="none" stroke="#A5D6A7" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Face -->
  <ellipse cx="166" cy="214" rx="42" ry="33" fill="url(#p4-face)"/>

  <!-- Happy crescent eyes -->
  <path d="M140,212 Q152,200 164,212" fill="none" stroke="#222" stroke-width="4" stroke-linecap="round"/>
  <path d="M172,212 Q184,200 196,212" fill="none" stroke="#222" stroke-width="4" stroke-linecap="round"/>
  <!-- Eye sparkles -->
  <circle cx="140" cy="212" r="2.5" fill="#FFB800" opacity="0.85"/>
  <circle cx="164" cy="212" r="2.5" fill="#FFB800" opacity="0.85"/>
  <circle cx="172" cy="212" r="2.5" fill="#FFB800" opacity="0.85"/>
  <circle cx="196" cy="212" r="2.5" fill="#FFB800" opacity="0.85"/>

  <!-- Big proud smile -->
  <path d="M150,228 Q166,246 182,228" fill="none" stroke="#AA0022" stroke-width="3.8" stroke-linecap="round"/>

  <!-- Cheeks (extra rosy, proud!) -->
  <ellipse cx="130" cy="226" rx="14" ry="9" fill="#FFB3C1" opacity="0.75"/>
  <ellipse cx="202" cy="226" rx="14" ry="9" fill="#FFB3C1" opacity="0.75"/>
</g>

<!-- === BOWL OF MIXED BERRIES === -->
<g filter="url(#p4-bowlshadow)">
  <!-- Bowl body -->
  <path d="M115,308 Q120,365 200,370 Q280,365 285,308 Z" fill="url(#p4-bowl)" stroke="#C8C0B0" stroke-width="2.5"/>
  <!-- Bowl rim -->
  <ellipse cx="200" cy="308" rx="85" ry="21" fill="#F0ECE0" stroke="#C8C0B0" stroke-width="2.5"/>
  <!-- Bowl rim highlight -->
  <path d="M128,302 Q200,294 272,302" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
  <!-- Bowl inner shadow -->
  <ellipse cx="200" cy="358" rx="68" ry="10" fill="#C0B8A8" opacity="0.22"/>

  <!-- Strawberries (no stems) -->
  <ellipse cx="162" cy="298" rx="20" ry="16" fill="#FF4466" stroke="#CC1133" stroke-width="2"/>
  <ellipse cx="168" cy="292" rx="4.5" ry="3.2" fill="#FFE14D" stroke="#CCA800" stroke-width="1" transform="rotate(-10,168,292)"/>
  <ellipse cx="157" cy="297" rx="4" ry="2.8" fill="#FFE14D" stroke="#CCA800" stroke-width="1"/>
  <ellipse cx="167" cy="304" rx="4" ry="2.8" fill="#FFE14D" stroke="#CCA800" stroke-width="1" transform="rotate(12,167,304)"/>

  <ellipse cx="200" cy="293" rx="20" ry="16" fill="#FF3355" stroke="#CC1133" stroke-width="2"/>
  <ellipse cx="206" cy="287" rx="4.5" ry="3.2" fill="#FFE14D" stroke="#CCA800" stroke-width="1" transform="rotate(5,206,287)"/>
  <ellipse cx="195" cy="292" rx="4" ry="2.8" fill="#FFE14D" stroke="#CCA800" stroke-width="1"/>
  <ellipse cx="204" cy="299" rx="4" ry="2.8" fill="#FFE14D" stroke="#CCA800" stroke-width="1" transform="rotate(-10,204,299)"/>

  <ellipse cx="238" cy="298" rx="19" ry="15" fill="#FF4466" stroke="#CC1133" stroke-width="2"/>
  <ellipse cx="244" cy="292" rx="4.2" ry="3" fill="#FFE14D" stroke="#CCA800" stroke-width="1" transform="rotate(8,244,292)"/>
  <ellipse cx="233" cy="297" rx="4" ry="2.8" fill="#FFE14D" stroke="#CCA800" stroke-width="1"/>

  <!-- Front row strawberries -->
  <ellipse cx="178" cy="312" rx="20" ry="16" fill="#FF3355" stroke="#CC1133" stroke-width="2"/>
  <ellipse cx="184" cy="306" rx="4.5" ry="3.2" fill="#FFE14D" stroke="#CCA800" stroke-width="1"/>
  <ellipse cx="173" cy="311" rx="4" ry="2.8" fill="#FFE14D" stroke="#CCA800" stroke-width="1" transform="rotate(-15,173,311)"/>
  <ellipse cx="184" cy="318" rx="4" ry="2.8" fill="#FFE14D" stroke="#CCA800" stroke-width="1" transform="rotate(10,184,318)"/>

  <ellipse cx="220" cy="310" rx="20" ry="16" fill="#FF4466" stroke="#CC1133" stroke-width="2"/>
  <ellipse cx="226" cy="304" rx="4.5" ry="3.2" fill="#FFE14D" stroke="#CCA800" stroke-width="1" transform="rotate(5,226,304)"/>
  <ellipse cx="215" cy="309" rx="4" ry="2.8" fill="#FFE14D" stroke="#CCA800" stroke-width="1"/>
  <ellipse cx="224" cy="316" rx="4" ry="2.8" fill="#FFE14D" stroke="#CCA800" stroke-width="1" transform="rotate(-10,224,316)"/>

  <!-- Blueberries (mixed in) -->
  <circle cx="148" cy="314" r="10" fill="#5566DD" stroke="#3344AA" stroke-width="1.8"/>
  <circle cx="148" cy="314" r="3.5" fill="#8899FF" opacity="0.55"/>
  <circle cx="151" cy="308" r="2" fill="white" opacity="0.4"/>

  <circle cx="168" cy="322" r="10" fill="#4455CC" stroke="#3344AA" stroke-width="1.8"/>
  <circle cx="168" cy="322" r="3.5" fill="#7788EE" opacity="0.55"/>

  <circle cx="244" cy="316" r="9.5" fill="#5566DD" stroke="#3344AA" stroke-width="1.8"/>
  <circle cx="244" cy="316" r="3.2" fill="#8899FF" opacity="0.55"/>

  <circle cx="228" cy="320" r="9" fill="#4455CC" stroke="#3344AA" stroke-width="1.8"/>
  <circle cx="228" cy="320" r="3" fill="#7788EE" opacity="0.55"/>

  <!-- Sparkle on bowl -->
  <text x="270" y="293" font-size="22" fill="#FFB800">✨</text>
</g>

<!-- Speech bubble -->
<path d="M16,38 Q16,18 36,18 L368,18 Q388,18 388,38 L388,90 Q388,110 368,110 L228,110 L216,126 L210,110 Q16,110 16,90 Z" fill="white" stroke="#FFD0E8" stroke-width="2.2" filter="url(#p4-soft)"/>
<text x="202" y="58" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">꼭지까지 완벽하게!</text>
<text x="202" y="80" text-anchor="middle" font-size="13" font-weight="bold" fill="#FF3355">베리봇 임무 완료~ 🎉</text>

<!-- Celebration effects -->
<text x="346" y="286" font-size="22" fill="#FF3355" opacity="0.65">🎉</text>
<text x="20" y="286" font-size="20" fill="#FF3355" opacity="0.65">🎉</text>

<!-- Panel number -->
<circle cx="32" cy="32" r="20" fill="#FF3355" stroke="white" stroke-width="2.8" filter="url(#p4-soft)"/>
<text x="32" y="38" text-anchor="middle" fill="white" font-size="15" font-weight="bold">4</text>

<!-- Bottom caption -->
<rect x="0" y="420" width="400" height="80" rx="0" fill="white" fill-opacity="0.55"/>
<rect x="0" y="420" width="400" height="3" fill="#FF3355" fill-opacity="0.32"/>
<text x="200" y="452" text-anchor="middle" fill="#CC1133" font-size="20" font-weight="bold">짜잔~ 드세요! 🎉</text>
<text x="200" y="474" text-anchor="middle" fill="#AA8090" font-size="12">딸기·블루베리 손질 완료, 바로 드세요!</text>
</svg>
